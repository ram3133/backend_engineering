name: Backend Engineering Job Monitor All Companies 4-7 Years

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backend-engineering-job-monitor-all-companies
  cancel-in-progress: false

jobs:
  monitor:
    name: Run backend engineering all-companies ntfy monitor
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
      ROLEPILOT_PROFILE: "backend-all-companies"
      ROLEPILOT_MIN_YEARS: "4"
      ROLEPILOT_MAX_YEARS: "7"
      ROLEPILOT_NTFY_TOPIC: "https://ntfy.sh/Backend_engineer_jobs"
      ROLEPILOT_WRITE_APP_OUTPUTS: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run backend engineering all-companies monitor
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File "work\job-monitor\run_backend_engineering_all_companies_4to7.ps1"

      - name: Commit state changes
        id: commit
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $paths = @(
            "work/job-monitor/gcc-product-companies.json",
            "work/job-monitor/seen-jobs.json",
            "work/job-monitor/recent-feed-jobs.json"
          )

          git add -- $paths

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            "changed=false" >> $env:GITHUB_OUTPUT
            "No state changes to commit."
            exit 0
          }

          git commit -m "Refresh backend engineering all-companies ntfy monitor state"
          git push
          "changed=true" >> $env:GITHUB_OUTPUT
